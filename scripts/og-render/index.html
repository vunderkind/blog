<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG Card</title>
<style>
@font-face {
  font-family: "et-book";
  src: url("./fonts/et-book/et-book-roman-line-figures/et-book-roman-line-figures.woff2") format("woff2");
  font-weight: normal; font-style: normal; font-display: block;
}
@font-face {
  font-family: "et-book";
  src: url("./fonts/et-book/et-book-display-italic-old-style-figures/et-book-display-italic-old-style-figures.woff2") format("woff2");
  font-weight: normal; font-style: italic; font-display: block;
}
@font-face {
  font-family: "et-book";
  src: url("./fonts/et-book/et-book-bold-line-figures/et-book-bold-line-figures.woff2") format("woff2");
  font-weight: bold; font-style: normal; font-display: block;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1200px; height: 630px;
  background: #fffff8; color: #111;
  font-family: et-book, Palatino, "Palatino Linotype", Georgia, serif;
  overflow: hidden;
}
.card {
  width: 100%; height: 100%;
  padding: 80px 90px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.brand {
  font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
  font-variant: small-caps;
  letter-spacing: 0.06em;
  font-size: 28px;
  color: #111;
  opacity: 0.7;
}
.body {
  flex: 1;
  display: flex; flex-direction: column; justify-content: center;
}
h1 {
  font-weight: 400;
  font-style: normal;
  font-size: 78px;
  line-height: 1.05;
  margin-bottom: 28px;
  /* clamp very long titles to keep layout sane */
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.subtitle {
  font-style: italic;
  font-size: 38px;
  line-height: 1.2;
  opacity: 0.85;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.foot {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
  letter-spacing: 0.03em;
  font-size: 22px;
  color: #111;
  opacity: 0.55;
}
.rule {
  height: 1px; background: #111; opacity: 0.15; margin: 0 0 32px;
}
</style>
</head>
<body>
<div class="card">
  <div class="brand" id="brand">~/Life of Mogwai</div>
  <div class="body">
    <h1 id="title">Title goes here</h1>
    <p class="subtitle" id="subtitle"></p>
  </div>
  <div>
    <div class="rule"></div>
    <div class="foot">
      <span id="date"></span>
      <span id="domain">gist.holeyfox.co</span>
    </div>
  </div>
</div>
<script>
(function(){
  // Read params from URL hash to avoid query-string escaping headaches
  // with Playwright. Format: #title=...&subtitle=...&date=...
  var params = {};
  var raw = location.hash.replace(/^#/, '');
  raw.split('&').forEach(function(kv){
    var i = kv.indexOf('=');
    if (i < 0) return;
    /* form-urlencoded uses '+' for space; decodeURIComponent leaves
       '+' as literal '+', so we substitute first. */
    var k = decodeURIComponent(kv.slice(0, i).replace(/\+/g, ' '));
    var v = decodeURIComponent(kv.slice(i + 1).replace(/\+/g, ' '));
    params[k] = v;
  });
  if (params.title) document.getElementById('title').textContent = params.title;
  if (params.subtitle) {
    document.getElementById('subtitle').textContent = params.subtitle;
  } else {
    document.getElementById('subtitle').style.display = 'none';
  }
  if (params.date) document.getElementById('date').textContent = params.date;
  if (params.brand) document.getElementById('brand').textContent = params.brand;
})();
</script>
</body>
</html>
