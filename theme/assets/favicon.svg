<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Asterism fleuron — warm gold typographic mark, slowly spinning.
       60° per cycle (the asterisk has 6-fold symmetry, so 60° looks
       like a full apparent rotation). 6s per cycle = gentle pace. -->
  <g stroke="#C69B59" stroke-width="10" stroke-linecap="round">
    <g transform="translate(50 50)">
      <line x1="-32" y1="0" x2="32" y2="0"/>
      <line x1="-32" y1="0" x2="32" y2="0" transform="rotate(60)"/>
      <line x1="-32" y1="0" x2="32" y2="0" transform="rotate(120)"/>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="0 0 0" to="60 0 0"
        dur="6s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>
</svg>
